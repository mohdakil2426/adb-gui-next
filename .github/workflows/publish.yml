name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example 0.2.5'
        required: true
        default: '0.2.5'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}-${{ inputs.version }}
  cancel-in-progress: false

env:
  BUN_VERSION: 1.3.13
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-22.04
    steps:
      - name: Require main branch
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Manual releases must run from main. Current ref: ${GITHUB_REF}"
            exit 1
          fi

      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      - name: Install frontend dependencies
        run: bun ci

      - name: Verify requested release version
        run: bun scripts/verify-release-version.mjs '${{ inputs.version }}'

      - name: Verify macOS signing secrets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID KEYCHAIN_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required GitHub secret: $name"
              exit 1
            fi
          done

          if [ "${#APPLE_TEAM_ID}" -lt 3 ]; then
            echo "::error::APPLE_TEAM_ID must be at least 3 characters"
            exit 1
          fi

      - name: Check formatting
        run: bun run format:check

      - name: Lint frontend
        run: bun run lint:web

      - name: Run frontend tests
        run: bun run test

      - name: TypeScript + Vite build
        run: bun run build

  build:
    name: Build ${{ matrix.name }} release assets
    needs: preflight
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            platform: ubuntu-22.04
            artifact-platform: linux
            bundle-targets: deb,rpm
            target-args: ''
          - name: windows-x64
            platform: windows-latest
            artifact-platform: windows
            bundle-targets: nsis,msi
            target-args: ''
          - name: macos-universal
            platform: macos-latest
            artifact-platform: macos
            bundle-targets: dmg
            target-args: '--target universal-apple-darwin'

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.artifact-platform == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Setup Apple Certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID KEYCHAIN_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required GitHub secret: $name"
              exit 1
            fi
          done

          if [ "${#APPLE_TEAM_ID}" -lt 3 ]; then
            echo "::error::APPLE_TEAM_ID must be at least 3 characters"
            exit 1
          fi

          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep -E "Developer ID Application|Apple Distribution|Apple Development" | head -n 1)
          if [ -z "$CERT_INFO" ]; then
            echo "::error::No Apple code signing identity found in imported certificate"
            security find-identity -v -p codesigning build.keychain
            exit 1
          fi

          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> $GITHUB_ENV

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      - name: Setup Bundled Permissions
        if: runner.os != 'Windows'
        run: |
          chmod +x src-tauri/resources/linux/adb || true
          chmod +x src-tauri/resources/linux/fastboot || true
          chmod +x src-tauri/resources/darwin/adb || true
          chmod +x src-tauri/resources/darwin/fastboot || true
          chmod +x src-tauri/resources/darwin/etc1tool || true
          chmod +x src-tauri/resources/darwin/hprof-conv || true
          chmod +x src-tauri/resources/darwin/make_f2fs || true
          chmod +x src-tauri/resources/darwin/make_f2fs_casefold || true
          chmod +x src-tauri/resources/darwin/mke2fs || true
          chmod +x src-tauri/resources/darwin/sqlite3 || true

      - name: Install frontend dependencies
        run: bun ci

      - name: Verify requested release version
        run: bun scripts/verify-release-version.mjs '${{ inputs.version }}'

      - name: Clean stale bundle outputs
        shell: bash
        run: rm -rf src-tauri/target/release/bundle src-tauri/target/universal-apple-darwin/release/bundle

      - name: Build Tauri packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY || '-' }}
        run: bun run tauri build --verbose --bundles ${{ matrix.bundle-targets }} ${{ matrix.target-args }}

      - name: Collect release assets
        shell: pwsh
        run: |
          ./scripts/collect-release-assets.ps1 `
            -Version '${{ inputs.version }}' `
            -Platform '${{ matrix.artifact-platform }}' `
            -OutputDir 'artifacts/${{ matrix.name }}' `
            -Release

      - name: Upload ${{ matrix.name }} release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: artifacts/${{ matrix.name }}/
          retention-days: 7
          if-no-files-found: error
          compression-level: 0

  publish-draft:
    name: Publish draft GitHub release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          find release-assets -type f ! -name 'build-info-*.json' -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed 's#release-assets/##' > release-assets/SHA256SUMS.txt
          cat release-assets/SHA256SUMS.txt

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            release-assets/AdbGuiNext-v${{ inputs.version }}-* \
            release-assets/SHA256SUMS.txt \
            --draft \
            --target main \
            --title "Adb Gui Next v${{ inputs.version }}" \
            --notes-file ".github/release-notes/v${{ inputs.version }}.md"
