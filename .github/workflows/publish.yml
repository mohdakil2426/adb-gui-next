name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example 0.2.0'
        required: true
        default: '0.2.0'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}-${{ inputs.version }}
  cancel-in-progress: false

env:
  BUN_VERSION: 1.3.13
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-22.04
    steps:
      - name: Require main branch
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Manual releases must run from main. Current ref: ${GITHUB_REF}"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      - name: Install frontend dependencies
        run: bun ci

      - name: Verify requested release version
        run: bun scripts/verify-release-version.mjs '${{ inputs.version }}'

      - name: Check formatting
        run: bun run format:check

      - name: Lint frontend
        run: bun run lint:web

      - name: Run frontend tests
        run: bun run test

      - name: TypeScript + Vite build
        run: bun run build

  build:
    name: Build ${{ matrix.name }} release assets
    needs: preflight
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            platform: ubuntu-22.04
            artifact-platform: linux
          - name: windows-x64
            platform: windows-latest
            artifact-platform: windows

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      - name: Install frontend dependencies
        run: bun ci

      - name: Verify requested release version
        run: bun scripts/verify-release-version.mjs '${{ inputs.version }}'

      - name: Build Tauri x64 packages
        run: bun run tauri build

      - name: Collect release assets
        shell: pwsh
        run: |
          ./scripts/collect-release-assets.ps1 `
            -Version '${{ inputs.version }}' `
            -Platform '${{ matrix.artifact-platform }}' `
            -OutputDir 'artifacts/${{ matrix.name }}' `
            -Release

      - name: Upload ${{ matrix.name }} release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: artifacts/${{ matrix.name }}/
          retention-days: 7
          if-no-files-found: error
          compression-level: 0

  publish-draft:
    name: Publish draft GitHub release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          find release-assets -type f ! -name 'build-info-*.json' -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed 's#release-assets/##' > release-assets/SHA256SUMS.txt
          cat release-assets/SHA256SUMS.txt

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" release-assets/* \
            --draft \
            --target main \
            --title "Adb Gui Next v${{ inputs.version }}" \
            --notes-file ".github/release-notes/v${{ inputs.version }}.md"
