name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.13
  CARGO_TERM_COLOR: always

jobs:
  quality-and-artifacts:
    name: Quality + ${{ matrix.name }} artifacts
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            platform: ubuntu-22.04
            artifact-platform: linux
            bundle-targets: deb,rpm
          - name: windows-x64
            platform: windows-latest
            artifact-platform: windows
            bundle-targets: nsis,msi

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      - name: Install frontend dependencies
        run: bun ci

      - name: Verify release version files
        run: bun run release:verify

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Run frontend tests
        run: bun run test

      - name: Run Rust tests
        if: runner.os != 'Windows'
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Compile Rust tests
        if: runner.os == 'Windows'
        run: cargo test --manifest-path src-tauri/Cargo.toml --no-run

      - name: TypeScript + Vite build
        run: bun run build

      - name: Clean stale bundle outputs
        shell: bash
        run: rm -rf src-tauri/target/release/bundle

      - name: Build Tauri x64 packages
        run: bun run tauri build --verbose --bundles ${{ matrix.bundle-targets }}

      - name: Collect release-style artifacts
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          ./scripts/collect-release-assets.ps1 `
            -Version $version `
            -Platform '${{ matrix.artifact-platform }}' `
            -OutputDir 'artifacts/${{ matrix.name }}'

      - name: Upload ${{ matrix.name }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AdbGuiNext-${{ matrix.name }}-${{ github.run_number }}
          path: artifacts/${{ matrix.name }}/
          retention-days: 14
          if-no-files-found: error
          compression-level: 0
