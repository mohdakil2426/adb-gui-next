[package]
name = "adb-gui-next"
version = "0.1.0"
description = "ADB GUI Next for Android device workflows"
authors = ["akila"]
edition = "2024"

[lib]
name = "adb_gui_next_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
prost-build = "0.14"
protoc-bin-vendored = "3"
tauri-build = { version = "2", features = [] }

[dependencies]
anyhow = "1"
bzip2 = "0.6"
log = "0.4"
memmap2 = "0.9"
prost = "0.14"
rayon = "1.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
tauri = { version = "2", features = [] }
tokio = { version = "1", features = ["rt-multi-thread"] }
tauri-plugin-dialog = "2"
tauri-plugin-log = "2"
tauri-plugin-opener = "2"
tempfile = "3"
which = "8"
xz2 = "0.1"
zstd = "0.13"
zip = "8.3.1"
tauri-plugin-clipboard-manager = "2.3.2"
