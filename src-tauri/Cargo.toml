[package]
name = "adb-gui-next"
version = "0.1.0"
description = "ADBKit Enhanced migrated to Tauri"
authors = ["akila"]
edition = "2021"

[lib]
name = "adb_gui_next_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-opener = "2"
which = "8"
zip = "6"
